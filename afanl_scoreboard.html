<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AFANL Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0a1f3c;
  --gold:#c9a84c;
  --white:#fff;
  --red:#dc3545;
}
body {
  font-family: 'Roboto', sans-serif;
  text-align:center;
  background:linear-gradient(160deg,#060f1e,#0a1f3c);
  color:white;
  margin:0;
  padding:20px;
}
h1 {
  font-family:'Oswald';
  color:var(--gold);
}
.team {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  width:250px;
}
.score {
  font-size:70px;
  font-family:'Oswald';
}
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.add1 { background:green;color:white;}
.add6 { background:black;color:gold;}
.sub { background:red;color:white;}
.score-container {
  display:flex;
  justify-content:center;
  gap:20px;
}
.logo-header {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.logo-header img {
  width:60px;
}
</style>
</head>

<body>

<div class="logo-header">
  <img id="logoImg">
  <h1>AFANL</h1>
</div>

<input id="teamOneName" placeholder="Team 1"><br><br>
<input id="teamTwoName" placeholder="Team 2">

<div class="score-container">
  <div class="team">
    <div id="score1" class="score">0</div>
    <button class="add1" onclick="updateScore(1,1)">+1</button>
    <button class="add6" onclick="updateScore(1,6)">+6</button>
    <button class="sub" onclick="updateScore(1,-1)">-1</button>
  </div>

  <div class="team">
    <div id="score2" class="score">0</div>
    <button class="add1" onclick="updateScore(2,1)">+1</button>
    <button class="add6" onclick="updateScore(2,6)">+6</button>
    <button class="sub" onclick="updateScore(2,-1)">-1</button>
  </div>
</div>

<br>
<button onclick="resetGame()">Reset</button>

<script>
const LOGO_URL = "https://raw.githubusercontent.com/PabloMad77/afanl-scoreboard/main/logo.png";

let score1 = 0;
let score2 = 0;

function updateScore(team, value) {
  if(team === 1){
    score1 = Math.max(0, score1 + value);
    document.getElementById("score1").innerText = score1;
  } else {
    score2 = Math.max(0, score2 + value);
    document.getElementById("score2").innerText = score2;
  }
}

function resetGame(){
  score1 = 0;
  score2 = 0;
  document.getElementById("score1").innerText = 0;
  document.getElementById("score2").innerText = 0;
}

function init(){
  // load logo safely
  const img = document.getElementById("logoImg");
  img.src = LOGO_URL;

  img.onerror = () => {
    console.log("Logo failed to load");
  };
}

// ✅ critical fix
document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
