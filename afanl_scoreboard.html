<script>
const LOGO_URL = 'https://raw.githubusercontent.com/PabloMad77/afanl-scoreboard/main/logo.png';
const GAME_KEY = 'afanl_game';
const PLAYERS_KEY = 'afanl_players';

let scoreOne = 0, scoreTwo = 0, players = [];

/* ================= SAFE STORAGE ================= */
function safeParse(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key)) || fallback;
  } catch (e) {
    console.warn('Corrupted storage for', key);
    return fallback;
  }
}

function saveGameState() {
  try {
    localStorage.setItem(GAME_KEY, JSON.stringify({
      scoreOne, scoreTwo,
      categoryName: document.getElementById('categoryName').value,
      teamOneName: document.getElementById('teamOneName').value,
      teamTwoName: document.getElementById('teamTwoName').value,
      jornadaSelect: document.getElementById('jornadaSelect').value,
      customJornada: document.getElementById('customJornada').value,
    }));
    flashSaved();
  } catch(e) {
    console.warn('Save failed');
  }
}

function savePlayers() {
  try {
    localStorage.setItem(PLAYERS_KEY, JSON.stringify(players));
    flashSaved();
  } catch(e) {}
}

/* ================= LOAD ================= */
function loadState() {
  players = safeParse(PLAYERS_KEY, []);

  const s = safeParse(GAME_KEY, null);
  if (!s) return renderAll();

  scoreOne = s.scoreOne || 0;
  scoreTwo = s.scoreTwo || 0;

  document.getElementById('teamOneScore').innerText = scoreOne;
  document.getElementById('teamTwoScore').innerText = scoreTwo;

  document.getElementById('categoryName').value = s.categoryName || '';
  document.getElementById('teamOneName').value = s.teamOneName || '';
  document.getElementById('teamTwoName').value = s.teamTwoName || '';

  if (s.jornadaSelect) {
    document.getElementById('jornadaSelect').value = s.jornadaSelect;

    if (s.jornadaSelect === 'custom') {
      document.getElementById('customJornada').style.display = 'inline-block';
      document.getElementById('customJornada').value = s.customJornada || '';
    }
  }

  renderAll();
}

/* ================= UI ================= */
function updateScore(t, val) {
  if (t === 'one') {
    scoreOne = Math.max(0, scoreOne + val);
    document.getElementById('teamOneScore').innerText = scoreOne;
  } else {
    scoreTwo = Math.max(0, scoreTwo + val);
    document.getElementById('teamTwoScore').innerText = scoreTwo;
  }
  saveGameState();
}

function resetGame() {
  if (!confirm('⚠️ Reset game?')) return;

  scoreOne = 0;
  scoreTwo = 0;

  document.getElementById('teamOneScore').innerText = 0;
  document.getElementById('teamTwoScore').innerText = 0;

  ['categoryName','teamOneName','teamTwoName','customJornada'].forEach(id => {
    document.getElementById(id).value = '';
  });

  document.getElementById('jornadaSelect').value = '';
  document.getElementById('customJornada').style.display = 'none';

  saveGameState();
}

function handleJornadaChange() {
  const val = document.getElementById('jornadaSelect').value;
  document.getElementById('customJornada').style.display =
    val === 'custom' ? 'inline-block' : 'none';
  saveGameState();
}

/* ================= PLAYERS ================= */
function addPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  const unit = document.getElementById('newPlayerUnit').value;

  if (!name) return;

  players.push({
    id: Date.now(),
    name,
    unit,
    td:0, catch:0, xp:0, int:0, flag:0, sack:0, defTd:0
  });

  document.getElementById('newPlayerName').value = '';
  savePlayers();
  renderAll();
}

/* ================= RENDER ================= */
function renderAll() {
  let off = '', def = '';

  players.forEach(p => {
    if (p.unit === 'offense') {
      off += `<tr><td>${p.name}</td><td>${p.td}</td><td>${p.catch}</td><td>${p.xp}</td></tr>`;
    }
    if (p.unit === 'defense') {
      def += `<tr><td>${p.name}</td><td>${p.int}</td><td>${p.flag}</td><td>${p.sack}</td><td>${p.defTd}</td></tr>`;
    }
  });

  document.getElementById('offenseTable').innerHTML =
    `<tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>${off}`;

  document.getElementById('defenseTable').innerHTML =
    `<tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>${def}`;
}

/* ================= LOGO ================= */
function loadLogo() {
  return new Promise(res => {
    const img = new Image();
    img.crossOrigin = "anonymous"; // IMPORTANT FIX
    img.onload = () => res(img);
    img.onerror = () => res(null);
    img.src = LOGO_URL;
  });
}

/* ================= INIT ================= */
document.addEventListener('DOMContentLoaded', () => {
  loadState();
});

/* ================= SAVE INDICATOR ================= */
let _t;
function flashSaved() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;

  el.classList.add('show');
  clearTimeout(_t);

  _t = setTimeout(() => {
    el.classList.remove('show');
  }, 1200);
}
</script>
