<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AFANL Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Roboto', sans-serif;
  background: #0a1f3c;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}
h1 { color: #c9a84c; }

.score-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.team {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
  width: 250px;
}

.score {
  font-size: 70px;
  font-family: 'Oswald';
}

button {
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add { background: green; color: white; }
.sub { background: red; color: white; }
.export { background: gold; color: black; }

input {
  width: 90%;
  padding: 8px;
  margin-bottom: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div style="display:flex;justify-content:center;align-items:center;gap:10px;">
  <img src="https://raw.githubusercontent.com/PabloMad77/afanl-scoreboard/main/logo.png" width="60">
  <h1>AFANL</h1>
</div>

<input id="teamOneName" placeholder="Team 1"><br>
<input id="teamTwoName" placeholder="Team 2">

<div class="score-container">
  <div class="team">
    <div class="score" id="score1">0</div>
    <button class="add" onclick="updateScore(1,1)">+1</button>
    <button class="add" onclick="updateScore(1,6)">+6</button>
    <button class="sub" onclick="updateScore(1,-1)">-1</button>
  </div>

  <div class="team">
    <div class="score" id="score2">0</div>
    <button class="add" onclick="updateScore(2,1)">+1</button>
    <button class="add" onclick="updateScore(2,6)">+6</button>
    <button class="sub" onclick="updateScore(2,-1)">-1</button>
  </div>
</div>

<button class="export" onclick="exportImage()">Export Image</button>
<button onclick="resetGame()">Reset</button>

<script>
const LOGO_URL = "https://raw.githubusercontent.com/PabloMad77/afanl-scoreboard/main/logo.png";

let score1 = 0;
let score2 = 0;

/* SAFE STORAGE */
function save() {
  try {
    localStorage.setItem("game", JSON.stringify({
      score1, score2,
      t1: document.getElementById("teamOneName").value,
      t2: document.getElementById("teamTwoName").value
    }));
  } catch(e) {}
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem("game"));
    if (!data) return;

    score1 = data.score1 || 0;
    score2 = data.score2 || 0;

    document.getElementById("score1").innerText = score1;
    document.getElementById("score2").innerText = score2;

    document.getElementById("teamOneName").value = data.t1 || "";
    document.getElementById("teamTwoName").value = data.t2 || "";
  } catch(e) {
    localStorage.clear();
  }
}

/* SCORE */
function updateScore(team, val) {
  if (team === 1) {
    score1 = Math.max(0, score1 + val);
    document.getElementById("score1").innerText = score1;
  } else {
    score2 = Math.max(0, score2 + val);
    document.getElementById("score2").innerText = score2;
  }
  save();
}

function resetGame() {
  if (!confirm("Reset game?")) return;
  score1 = 0;
  score2 = 0;
  document.getElementById("score1").innerText = 0;
  document.getElementById("score2").innerText = 0;
  save();
}

/* EXPORT */
function exportImage() {
  const canvas = document.createElement("canvas");
  canvas.width = 800;
  canvas.height = 400;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#0a1f3c";
  ctx.fillRect(0,0,800,400);

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = LOGO_URL;

  img.onload = () => {
    ctx.drawImage(img, 350, 20, 100, 100);

    ctx.fillStyle = "white";
    ctx.font = "40px Oswald";
    ctx.textAlign = "center";

    const t1 = document.getElementById("teamOneName").value || "TEAM 1";
    const t2 = document.getElementById("teamTwoName").value || "TEAM 2";

    ctx.fillText(t1, 200, 200);
    ctx.fillText(t2, 600, 200);

    ctx.font = "80px Oswald";
    ctx.fillText(score1, 200, 300);
    ctx.fillText(score2, 600, 300);

    const link = document.createElement("a");
    link.download = "score.png";
    link.href = canvas.toDataURL();
    link.click();
  };
}

/* INIT */
document.addEventListener("DOMContentLoaded", load);
</script>

</body>
</html>
